<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGradient)"/>
  
  <!-- Stylized click/hand icon -->
  <g filter="url(#shadow)">
    <!-- Main finger/hand shape -->
    <path d="M160 200
             Q160 140 220 140
             L280 140
             Q340 140 340 200
             L340 280
             Q340 320 300 340
             L280 380
             Q260 400 220 380
             L180 340
             Q140 320 140 280
             L140 240
             Q140 200 160 200Z" 
          fill="white"
          opacity="0.95"/>
    
    <!-- Click indicator - tap point -->
    <circle cx="250" cy="250" r="20" fill="#ec4899"/>
    <circle cx="250" cy="250" r="30" fill="none" stroke="white" stroke-width="4" opacity="0.6"/>
    
    <!-- Speed lines -->
    <path d="M360 180 L390 160" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <path d="M370 200 L405 190" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <path d="M380 220 L420 220" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  </g>
  
  <!-- Subtle highlight -->
  <ellipse cx="150" cy="150" rx="80" ry="40" fill="white" opacity="0.1"/>
</svg>