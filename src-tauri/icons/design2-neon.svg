<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark theme with neon accents -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#1e1e2e"/>
  
  <!-- Mouse pointer with neon effect -->
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Stylized arrow pointer -->
  <path d="M156 96
           L356 236
           L256 236
           L326 436
           L256 456
           L186 256
           L96 296
           Z" 
        fill="#00d9ff"
        filter="url(#neon-glow)"
        stroke="#00a3cc"
        stroke-width="3"/>
  
  <!-- Click burst effect -->
  <g opacity="0.8">
    <circle cx="280" cy="300" r="25" fill="none" stroke="#ff6b9d" stroke-width="4"/>
    <circle cx="280" cy="300" r="45" fill="none" stroke="#ff6b9d" stroke-width="2" opacity="0.6"/>
    <circle cx="280" cy="300" r="65" fill="none" stroke="#ff6b9d" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Speed lines -->
  <path d="M380 120 L420 100" stroke="#00d9ff" stroke-width="3" stroke-linecap="round"/>
  <path d="M390 150 L435 145" stroke="#00d9ff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Central click point -->
  <circle cx="280" cy="300" r="10" fill="#ff6b9d"/>
</svg>